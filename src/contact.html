<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ Với Chúng Tôi - QualiMeal</title>
    
    <!-- Meta Descriptions for SEO -->
    <meta name="description" content="Liên hệ với QualiMeal để được tư vấn chứng nhận ISO 22000, HACCP, GMP, R&D thực phẩm nhanh chóng, chuyên nghiệp và uy tín hàng đầu.">
    <meta name="keywords" content="liên hệ QualiMeal, địa chỉ phòng lab, hotline an toàn thực phẩm">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Preconnect and Google Fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Oswald:wght@200..700&family=Quicksand:wght@300..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <!-- Custom & Root Color CSS -->
    <link rel="stylesheet" href="colors.css">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Tailwind Custom Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            deep: '#142213',       /* Deep Forest Green */
                            green: '#5d6837',      /* Olive/Sage Green */
                            emerald: '#658568',    /* Medium Sage Green */
                            gold: '#cda069',       /* Ochre Gold */
                            beige: '#f5f3ef',      /* Warm Sand/Beige */
                            orange: '#d97706',     /* Warm Amber */
                            light: '#faf8f5'       /* Warm White */
                        }
                    },
                    fontFamily: {
                        sans: ['"Iosevka Charon"', 'sans-serif'],
                        display: ['"Roboto Condensed"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <!-- Deferred Interactivity Logic -->
    <script src="app.js" defer></script>
</head>
<body class="bg-brand-beige text-[#2d3527] font-sans antialiased overflow-x-hidden" data-page="contact">

    <!-- INCLUDE components/header.html -->



    <!-- Page Title Banner -->
    <div class="bg-brand-deep text-white py-12 px-6 relative overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center opacity-25" style="background-image: url('assets/banners/banner1.jpg');"></div>
        <div class="max-w-7xl mx-auto relative z-10 text-center space-y-3">
            <h1 class="font-display font-extrabold text-3xl md:text-4xl text-brand-gold">Liên Hệ Tư Vấn</h1>
            <p class="text-sm text-slate-300 max-w-lg mx-auto">Đội ngũ chuyên gia của chúng tôi luôn sẵn sàng hỗ trợ doanh nghiệp của bạn 24/7.</p>
        </div>
    </div>

    <!-- INCLUDE components/contact.html -->

    <!-- Location Map Emulation (Google Map Placeholder for visual premium feeling) -->
    <section class="py-12 bg-white border-t border-slate-100">
        <div class="max-w-7xl mx-auto px-6 md:px-8 space-y-6">
            <h3 class="font-display font-extrabold text-xl text-brand-deep text-center">Bản Đồ Chỉ Đường</h3>
            <div class="w-full h-[350px] bg-slate-100 rounded-3xl border border-slate-200 shadow-md relative overflow-hidden flex items-center justify-center">
                <!-- Decorative map placeholder image -->
                <div class="absolute inset-0 bg-cover bg-center opacity-75" style="background-image: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?q=80&w=1200&auto=format&fit=crop');"></div>
                <div class="absolute inset-0 bg-brand-deep/30"></div>
                <div class="relative z-10 text-center text-white bg-brand-deep/90 p-6 rounded-2xl border border-white/10 max-w-md">
                    <i class="fa-solid fa-map-location-dot text-brand-gold text-3xl mb-3"></i>
                    <h4 class="font-bold text-sm">Trụ Sở Chính - Quận 7</h4>
                    <p class="text-[11px] text-slate-300 mt-1">Tầng 12, Tòa nhà Asia Land, 150 Nguyễn Lương Bằng, Quận 7, TP. HCM</p>
                    <a href="https://maps.google.com" target="_blank" class="mt-4 inline-flex items-center text-xs text-brand-gold font-bold hover:underline">
                        <span>Mở trong Google Maps</span>
                        <i class="fa-solid fa-arrow-up-right-from-square ml-1.5"></i>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- INCLUDE components/footer.html -->

    <!-- INCLUDE components/modals.html -->

</body>
</html>
